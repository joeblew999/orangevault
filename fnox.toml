# orangevault — secrets + config resolved from the macOS keychain.
#
# Write a value with:   fnox set --global -p keychain <KEY>
#
# Shared item names ARE the cross-repo contract — renaming a key here
# without updating every consumer breaks auth silently. Coordinate name
# changes across repos.
#
# This file is the manifest of what the repo *needs* — mise tasks read
# these via `fnox get` and pass them to wrangler (as env vars for
# secrets, as --var for public config like DOMAIN).

[providers.keychain]
type = "keychain"
service = "fnox"

[secrets]
# Cloudflare deploy credentials (shared across every CF Workers repo).
CLOUDFLARE_API_TOKEN     = { provider = "keychain", value = "CLOUDFLARE_API_TOKEN" }
CLOUDFLARE_ACCOUNT_ID    = { provider = "keychain", value = "CLOUDFLARE_ACCOUNT_ID" }

# Production domain — read by `mise run deploy` and passed to wrangler
# via `--var DOMAIN:...`. Local dev forces http://localhost:8787 so the
# keychain value never affects local runs.
ORANGEVAULT_DOMAIN       = { provider = "keychain", value = "ORANGEVAULT_DOMAIN" }

# bw / rbw CLI ↔ orangevault wiring (set after one-time web-UI registration):
#   ORANGEVAULT_EMAIL           — your account email (rbw needs this in config)
#   ORANGEVAULT_BW_CLIENTID     — from Settings → Security → API Key
#   ORANGEVAULT_BW_CLIENTSECRET — from Settings → Security → API Key
#   ORANGEVAULT_MASTER_PASSWORD — needed to unlock the vault non-interactively
ORANGEVAULT_EMAIL            = { provider = "keychain", value = "ORANGEVAULT_EMAIL" }
ORANGEVAULT_BW_CLIENTID      = { provider = "keychain", value = "ORANGEVAULT_BW_CLIENTID" }
ORANGEVAULT_BW_CLIENTSECRET  = { provider = "keychain", value = "ORANGEVAULT_BW_CLIENTSECRET" }
ORANGEVAULT_MASTER_PASSWORD  = { provider = "keychain", value = "ORANGEVAULT_MASTER_PASSWORD" }

# orangevault doesn't have a server-managed JWT secret — RSA keypair is
# generated lazily on first request and persisted in KV. Future additions:
#   ADMIN_TOKEN     (admin panel auth, when that ships)
#   SMTP_API_KEY    (transactional email via Resend/SendGrid, when email lands)
