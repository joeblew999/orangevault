name = "orangevault"
main = "build/worker/shim.mjs"
compatibility_date = "2026-04-01"

[build]
command = "cargo install -q worker-build@^0.8 && worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "orangevault"
database_id = "844a51fd-229d-4e2b-8fb1-a4f37bd17c22"

[[r2_buckets]]
binding = "FILES"
bucket_name = "orangevault-files"

[[kv_namespaces]]
binding = "CACHE"
id = "b71ded4c59084b2897cd3a5007946670"

[durable_objects]
bindings = [
  { name = "USER_NOTIFIER", class_name = "UserNotifier" }
]

# Static web vault (Bitwarden web client, vaultwarden-patched).
# Populate ./web-vault/ via `scripts/fetch-web-vault.sh`.
# SPA fallback returns index.html for unknown paths so the Angular router
# can take over; API-ish paths below always hit the Worker instead.
[assets]
directory = "./web-vault"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/alive",
  "/api/*",
  "/accounts/*",
  "/identity/*",
  "/notifications/*",
  "/icons/*",
  "/app-id.json",
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserNotifier"]

[triggers]
crons = [
  "0 */6 * * *",   # Every 6 hours: purge expired sends + send files from R2
  "0 0 * * *",     # Daily: purge trashed ciphers (soft-deleted 30+ days ago)
]

[vars]
DOMAIN = "https://vault.example.com"
SIGNUPS_ALLOWED = "true"
WEB_VAULT_ENABLED = "true"
