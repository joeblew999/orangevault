name: mise release
# Generated by `mise run mise:repo:bootstrap --release`. On tag push, each OS
# builds its own arch (no cross-compile) and attaches binaries to the release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    # REQUIRED — a reusable workflow can't elevate the default read-only
    # GITHUB_TOKEN; without this the publish job startup_failures.
    permissions:
      contents: write
    uses: joeblew999/.github/.github/workflows/reusable-mise-release.yml@main
    with:
      # linux-amd64 + linux-arm64 + darwin-arm64 + windows-amd64. macos-13 (Intel)
      # dropped — scarce runners hung the publish; Apple Silicon + Linux + Windows
      # cover real users.
      os-matrix: '["ubuntu-latest", "ubuntu-24.04-arm", "macos-latest", "windows-latest"]'
