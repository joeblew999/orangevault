[settings]
experimental = true

# orangevault — fork of connyay/orangevault.
# Bitwarden-compatible vault API on Cloudflare Workers (Rust → WASM).
#
# Fresh-machine spin-up:
#   1. fnox set --global -p keychain CLOUDFLARE_API_TOKEN
#      fnox set --global -p keychain CLOUDFLARE_ACCOUNT_ID
#      fnox set --global -p keychain ORANGEVAULT_DOMAIN       # production domain
#   2. mise install
#      rustup target add wasm32-unknown-unknown
#   3. mise run dev      (local — DOMAIN forced to http://localhost:8787)
#      mise run deploy   (production — DOMAIN read from fnox)

[tools]
node              = "lts"
"npm:wrangler"    = "latest"
"github:jdx/fnox" = "1.24"
# Rust toolchain comes from system rustup (stable + wasm32-unknown-unknown).

[tasks."deps:update"]
description = "Refresh Cargo.lock so wasm-bindgen >= 0.2.121 (required by worker-build@0.8.3; upstream lockfile pins 0.2.118 and the build aborts otherwise). Idempotent."
run         = "cargo update"

[tasks."web-vault"]
description = "Download the Bitwarden web vault static assets into ./web-vault/ (skips if already present). Required by the [assets] binding in wrangler.toml."
run         = "test -d web-vault || bash scripts/fetch-web-vault.sh"

[tasks.dev]
description = "Run locally via wrangler dev. DOMAIN overridden to http://localhost:8787 so /api/config returns the right origin."
depends     = ["deps:update", "web-vault"]
run         = "wrangler dev --var DOMAIN:http://localhost:8787"

[tasks.deploy]
description = "Build + deploy to Cloudflare Workers. Reads CLOUDFLARE_API_TOKEN + ORANGEVAULT_DOMAIN from fnox keychain."
depends     = ["deps:update", "web-vault"]
shell       = "nu -c"
run = '''
$env.CLOUDFLARE_API_TOKEN = (^fnox get CLOUDFLARE_API_TOKEN | str trim)
let domain = (^fnox get ORANGEVAULT_DOMAIN | str trim)
if ($domain | is-empty) {
  print --stderr "✗ ORANGEVAULT_DOMAIN empty — set via: fnox set --global -p keychain ORANGEVAULT_DOMAIN"
  exit 1
}
print $"→ wrangler deploy   DOMAIN=($domain)"
^wrangler deploy --var $"DOMAIN:($domain)"
'''

[tasks.tail]
description = "Tail live Worker logs. Reads CLOUDFLARE_API_TOKEN from fnox keychain."
shell       = "nu -c"
run = '''
$env.CLOUDFLARE_API_TOKEN = (^fnox get CLOUDFLARE_API_TOKEN | str trim)
^wrangler tail
'''

[tasks.test]
description = "Run integration tests (Vitest + Miniflare). pretest builds the WASM worker."
dir         = "{{ config_root }}/integration-tests"
depends     = ["deps:update"]
run         = "npm install && npm test"
