[settings]
experimental = true

# orangevault — fork of connyay/orangevault.
# Bitwarden-compatible vault API on Cloudflare Workers (Rust → WASM).
#
# ── Fresh-machine spin-up ─────────────────────────────────────────────────
#   1. fnox set --global -p keychain CLOUDFLARE_API_TOKEN
#      fnox set --global -p keychain CLOUDFLARE_ACCOUNT_ID
#      fnox set --global -p keychain ORANGEVAULT_DOMAIN       # production domain
#   2. mise install
#      rustup target add wasm32-unknown-unknown
#   3. mise run d1:migrate    # one-time: create local D1 tables
#   4. mise run dev           # local — wrangler dev (HTTPS, DOMAIN=https://localhost:8787)
#      mise run deploy        # production — DOMAIN read from fnox
#
# ── Account / fnox bitwarden provider setup (ONE-TIME per account) ────────
# Modern Bitwarden CLI dropped `register`, but orangevault-cli does the correct
# client-side crypto (PBKDF2 + RSA + AES), so account creation is now FULLY
# SCRIPTABLE — no web vault needed:
#
#   a. Pick an identity (no email delivery happens — any unique address works):
#      fnox set --global -p keychain ORANGEVAULT_EMAIL            # e.g. me@example.com
#      fnox set --global -p keychain ORANGEVAULT_MASTER_PASSWORD  # a strong password
#   b. mise run cli:provision
#      → register (idempotent) + mint API key + store ORANGEVAULT_BW_CLIENTID /
#        ORANGEVAULT_BW_CLIENTSECRET in the keychain. One command.
#   c. mise run bw:bootstrap            (or rbw:bootstrap)
#      → bw config server → bw login --apikey → bw unlock → prints BW_SESSION
#
# (The old manual path — web vault "Create Account" → Settings → Security → Keys
# → "View API Key" — still works, but cli:provision replaces it.)
#
# After that, every subsequent operation is fully automated — fnox's
# bitwarden provider (configured per-repo in fnox.toml) can read/write
# items in this orangevault from any mise task on any machine that has
# the API key in its keychain.

[tools]
node                 = "lts"
"npm:wrangler"       = "latest"
"npm:@bitwarden/cli" = "latest"   # bw — for post-registration account access
"cargo:rbw"          = "1.15"     # rbw — pure-Rust Bitwarden CLI with daemon-cached unlock (preferred over bw)
"github:jdx/fnox"    = "1.24"
# Rust toolchain comes from system rustup (stable + wasm32-unknown-unknown).

[tasks."deps:update"]
description = "Refresh Cargo.lock so wasm-bindgen >= 0.2.121 (required by worker-build@0.8.3; upstream lockfile pins 0.2.118 and the build aborts otherwise). Idempotent."
run         = "cargo update"

[tasks."web-vault"]
description = "Download the Bitwarden web vault static assets into ./web-vault/ (skips if already present). Required by the [assets] binding in wrangler.toml."
run         = "test -d web-vault || bash scripts/fetch-web-vault.sh"

[tasks."d1:migrate"]
description = "Apply D1 migrations to the local miniflare DB. Idempotent. Run once before first dev/test."
run         = "wrangler d1 migrations apply DB --local"

[tasks.dev]
description = "Run locally via wrangler dev. HTTPS (self-signed cert) + DOMAIN=https://localhost:8787 — required by Bitwarden clients, which reject plain http."
depends     = ["deps:update", "web-vault", "d1:migrate"]
run         = "wrangler dev --local-protocol https --var DOMAIN:https://localhost:8787"

[tasks.deploy]
description = "Build + deploy to Cloudflare Workers. Reads CLOUDFLARE_API_TOKEN + ORANGEVAULT_DOMAIN from fnox keychain."
depends     = ["deps:update", "web-vault"]
shell       = "nu -c"
run = '''
$env.CLOUDFLARE_API_TOKEN = (^fnox get CLOUDFLARE_API_TOKEN | str trim)
let domain = (^fnox get ORANGEVAULT_DOMAIN | str trim)
if ($domain | is-empty) {
  print --stderr "✗ ORANGEVAULT_DOMAIN empty — set via: fnox set --global -p keychain ORANGEVAULT_DOMAIN"
  exit 1
}
print $"→ wrangler deploy   DOMAIN=($domain)"
^wrangler deploy --var $"DOMAIN:($domain)"
'''

[tasks.tail]
description = "Tail live Worker logs. Reads CLOUDFLARE_API_TOKEN from fnox keychain."
shell       = "nu -c"
run = '''
$env.CLOUDFLARE_API_TOKEN = (^fnox get CLOUDFLARE_API_TOKEN | str trim)
^wrangler tail
'''

[tasks.test]
description = "Run integration tests (Vitest + Miniflare). pretest builds the WASM worker."
dir         = "{{ config_root }}/integration-tests"
depends     = ["deps:update"]
run         = "npm install && npm test"

# ── bw CLI ↔ orangevault wiring ────────────────────────────────────────────
# All bw:* tasks read ORANGEVAULT_DOMAIN + ORANGEVAULT_BW_CLIENTID +
# ORANGEVAULT_BW_CLIENTSECRET + ORANGEVAULT_MASTER_PASSWORD from fnox.

[tasks."bw:config"]
description = "Point bw CLI at the orangevault server (idempotent)."
shell       = "nu -c"
run = '''
let domain = (^fnox get ORANGEVAULT_DOMAIN | str trim)
^bw config server $domain
print $"✓ bw configured to ($domain)"
'''

[tasks."bw:login"]
description = "Log into orangevault via API key (BW_CLIENTID + BW_CLIENTSECRET from fnox). Idempotent — no-op if already logged in."
depends     = ["bw:config"]
shell       = "nu -c"
run = '''
let status = (^bw status | from json | get status)
if $status != "unauthenticated" {
  print $"✓ already logged in \(status=($status)\)"
  return
}
$env.BW_CLIENTID = (^fnox get ORANGEVAULT_BW_CLIENTID | str trim)
$env.BW_CLIENTSECRET = (^fnox get ORANGEVAULT_BW_CLIENTSECRET | str trim)
^bw login --apikey
print "✓ bw logged in (locked)"
'''

[tasks."bw:unlock"]
description = "Unlock the bw vault using the master password from fnox. Prints BW_SESSION to stdout (capture with: export BW_SESSION=$(mise run bw:unlock))."
depends     = ["bw:login"]
shell       = "nu -c"
run = '''
let pw = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
let session = ($pw | ^bw unlock --raw | str trim)
print $session
'''

[tasks."bw:bootstrap"]
description = "End-to-end post-registration setup: config + login + unlock. Run once per machine after manual web-UI account registration."
shell       = "nu -c"
run = '''
let domain = (^fnox get ORANGEVAULT_DOMAIN | str trim)
^bw config server $domain
print $"  ✓ bw config server ($domain)"

let status = (^bw status | from json | get status)
if $status == "unauthenticated" {
  $env.BW_CLIENTID = (^fnox get ORANGEVAULT_BW_CLIENTID | str trim)
  $env.BW_CLIENTSECRET = (^fnox get ORANGEVAULT_BW_CLIENTSECRET | str trim)
  ^bw login --apikey
  print "  ✓ bw login --apikey"
} else {
  print $"  ✓ already logged in \(status=($status)\)"
}

let pw = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
let session = ($pw | ^bw unlock --raw | str trim)
print "  ✓ bw unlock"
print ""
print "BW_SESSION exported to next shell:"
print $"  export BW_SESSION=($session)"
'''

[tasks."bw:status"]
description = "Show current bw status (logged in, locked, server URL)."
run         = "bw status"

[tasks."bw:logout"]
description = "Log out of bw CLI. Use to reset state."
run         = "bw logout"

# ── rbw CLI ↔ orangevault wiring ───────────────────────────────────────────
# rbw is the pure-Rust Bitwarden CLI (doy/rbw). Preferred over bw because:
#   - rbw-agent daemon holds keys in memory (one unlock per session, not
#     per fetch), like ssh-agent
#   - no Node dep
#   - directly usable as a Rust library — basis for the register CLI
# Configure fnox.toml with `backend = "rbw"` on your bitwarden provider
# to route fnox lookups through rbw instead of bw.

[tasks."rbw:config"]
description = "Configure rbw to point at orangevault (base_url + email). Idempotent."
shell       = "nu -c"
run = '''
let domain = (^fnox get ORANGEVAULT_DOMAIN | str trim)
let email = (^fnox get ORANGEVAULT_EMAIL | str trim)
^rbw config set base_url $domain
^rbw config set email $email
print $"✓ rbw configured: base_url=($domain) email=($email)"
'''

[tasks."rbw:register"]
description = "Register this device with orangevault using API key. Reads ORANGEVAULT_BW_CLIENTID + ORANGEVAULT_BW_CLIENTSECRET from fnox. rbw will prompt for them interactively — paste when asked."
depends     = ["rbw:config"]
shell       = "nu -c"
run = '''
# rbw register prompts for personal API key client_id + client_secret.
# Print the fnox-stored values so user can paste them in.
let client_id = (^fnox get ORANGEVAULT_BW_CLIENTID | str trim)
let client_secret = (^fnox get ORANGEVAULT_BW_CLIENTSECRET | str trim)
print "rbw will prompt for:"
print $"  client_id     = ($client_id)"
print $"  client_secret = (***hidden, in fnox ORANGEVAULT_BW_CLIENTSECRET***)"
print ""
^rbw register
'''

[tasks."rbw:unlock"]
description = "Unlock the rbw vault. Reads ORANGEVAULT_MASTER_PASSWORD from fnox and pipes to rbw."
shell       = "nu -c"
run = '''
let pw = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
$pw | ^rbw unlock
print "✓ rbw unlocked"
'''

[tasks."rbw:bootstrap"]
description = "End-to-end: configure rbw + register device + unlock. Run once per machine after the manual web-UI account + API-key creation."
depends     = ["rbw:config", "rbw:register"]
shell       = "nu -c"
run = '''
let pw = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
$pw | ^rbw unlock
^rbw sync
print "✓ rbw bootstrapped + synced"
print "  test:  rbw ls"
'''

[tasks."rbw:status"]
description = "Show rbw config + lock state."
run         = "rbw config show && echo '---' && rbw unlocked"

[tasks."rbw:purge"]
description = "Log out of rbw (purges local DB). Use to reset state."
run         = "rbw purge"

# ── orangevault-cli (native binary at ./cli) ───────────────────────────────
# Operator CLI. Currently implements `register` so account creation is fully
# scriptable (the bw/rbw CLIs don't have a real `register account` command).

[tasks."cli:build"]
description = "Build the orangevault-cli release binary at ./cli/target/release/orangevault-cli."
dir         = "{{ config_root }}/cli"
run         = "cargo build --release"

[tasks."cli:register"]
description = "Register a real Bitwarden-compatible account on the deployed orangevault. Reads server + email + master password from fnox."
depends     = ["cli:build"]
shell       = "nu -c"
run = '''
$env.OV_SERVER = (^fnox get ORANGEVAULT_DOMAIN | str trim)
$env.OV_EMAIL = (^fnox get ORANGEVAULT_EMAIL | str trim)
$env.OV_MASTER_PASSWORD = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
^./cli/target/release/orangevault-cli register
'''

[tasks."cli:get-apikey"]
description = "Mint the API key (client_id/secret) for an existing account — no web vault. Prints BW_CLIENTID / BW_CLIENTSECRET. Reads server/email/password from fnox."
depends     = ["cli:build"]
shell       = "nu -c"
run = '''
$env.OV_SERVER = (^fnox get ORANGEVAULT_DOMAIN | str trim)
$env.OV_EMAIL = (^fnox get ORANGEVAULT_EMAIL | str trim)
$env.OV_MASTER_PASSWORD = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
^./cli/target/release/orangevault-cli get-apikey
'''

# cli:provision — TURNKEY account bootstrap, no web vault. register (idempotent:
# an existing account is fine) → get-apikey → store ORANGEVAULT_BW_CLIENTID /
# ORANGEVAULT_BW_CLIENTSECRET in the keychain. Reads server/email/master password
# from fnox (set ORANGEVAULT_EMAIL + ORANGEVAULT_MASTER_PASSWORD first). This is
# the whole "create an account other repos can read secrets from" flow in one task.
[tasks."cli:provision"]
description = "Turnkey: register (if needed) + mint API key + store BW_CLIENTID/SECRET in keychain. No web vault."
depends     = ["cli:build"]
shell       = "nu -c"
run = '''
$env.OV_SERVER = (^fnox get ORANGEVAULT_DOMAIN | str trim)
$env.OV_EMAIL = (^fnox get ORANGEVAULT_EMAIL | str trim)
$env.OV_MASTER_PASSWORD = (^fnox get ORANGEVAULT_MASTER_PASSWORD | str trim)
let cli = "./cli/target/release/orangevault-cli"

# Register — an already-registered account returns non-zero ("already exists"); that
# is fine, we only need it to exist before minting the key.
let reg = (do { ^$cli register --name "orangevault account" } | complete)
if $reg.exit_code == 0 { print "  ✓ account registered" } else { print "  • account already exists (continuing)" }

# Mint client_id/secret and store under ORANGEVAULT_BW_*.
let out = (^$cli get-apikey | lines)
let cid = ($out | where {|l| $l | str starts-with "BW_CLIENTID=" } | first | str replace "BW_CLIENTID=" "")
let csec = ($out | where {|l| $l | str starts-with "BW_CLIENTSECRET=" } | first | str replace "BW_CLIENTSECRET=" "")
if ($cid | is-empty) or ($csec | is-empty) { print -e "✗ get-apikey returned no key"; exit 1 }
$cid | ^fnox set --global -p keychain ORANGEVAULT_BW_CLIENTID
$csec | ^fnox set --global -p keychain ORANGEVAULT_BW_CLIENTSECRET
print "  ✓ stored ORANGEVAULT_BW_CLIENTID + ORANGEVAULT_BW_CLIENTSECRET (keychain)"
print "Next: mise run bw:bootstrap   (or rbw:bootstrap) — then fnox's bitwarden provider can read/write items."
'''
